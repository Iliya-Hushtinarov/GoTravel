<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>GoTravel Вход</title>
	<meta name="description" content="Влез в профила си в GoTravel и управлявай своите резервации и любими оферти лесно и бързо.">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<link rel="stylesheet" type="text/css" href="style.css">
	<link rel="icon" type="image/png" href="images/favicon-2.png">
	<script src="script.js" defer></script>
</head>
<body>
	<header class="main-header solid">
		<a href="index.html">
		<div class="header-logo">
			
			<div class="img-logo">
				<img src="images/logo.png" alt="logo-img">
			</div>
				
			<h1><span>Go</span>Travel</h1>
		</div>
		</a>	
	</header>
	<main class="sign-main">
		<section class="sign-sec">
			<h1>Влизане</h1>
			<form action="index.html" class="sign-form">
			  	<div class="row">
					<div class="mb-3 col-sm-6">
					   <label for="email-log" class="form-label">Имейл адрес:</label>
			    		<input type="email" class="form-control" id="email-log" aria-describedby="emailHelp">
			    		<p class="errors" id="email-error-log"></p>
					</div>
					<div class="mb-3 col-sm-6">
					    <label for="password-log" class="form-label">Парола:</label>
					    <input type="password" class="form-control" id="password-log">
					    <p class="errors" id="password-error-log"></p>
					</div>
				</div>
				
				 	 <div class=" button-wrapper">
				  		<button type="submit" id="log-button" class="btn btn-primary form-button" onclick="return Validate('logIn')">Влез</button>
				  </div>
			</form>
			<p>Ако нямате регистрация, може да се регистрирате <a href="signIn.html">тук.</a> </p>
		</section>
	</main>
	
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
