<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>GoTravel Регистрация</title>
	<meta name="description" content="Регистрирай се в GoTravel и започни да планираш своите пътувания с подбрани оферти и персонализирано изживяване.">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<link rel="stylesheet" type="text/css" href="style.css">
	<link rel="icon" type="image/png" href="images/favicon-2.png">
	<script src="script.js" defer></script>
</head>
<body>
	<header class="main-header solid">
		<a href="index.html">
		<div class="header-logo">
			
			<div class="img-logo">
				<img src="images/logo.png" alt="logo-img">
			</div>
				
			<h1><span>Go</span>Travel</h1>
		</div>
		</a>	
	</header>
	<main class="sign-main">
		<section class="sign-sec">
			<h1>Регистрация</h1>
			<form  action="index.html" method="POST" class="sign-form">
				<div class="row">
					<div class="mb-3 col-sm-6">
				    	<label for="name" class="form-label">Име:</label>
				    	<input type="text" class="form-control" id="name">
				    	<p class="errors" id="name-error"></p>
					</div>
					<div class="mb-3 col-sm-6">
					    <label for="sirname" class="form-label">Фамилия:</label>
					    <input type="text" class="form-control" id="surname">
					    <p class="errors" id="surname-error"></p>
					</div>
				</div>
			  	<div class="row">
					<div class="mb-3 col-sm-6">
				    	<label for="phone" class="form-label">Телефон:</label>
				    	<input type="text" class="form-control" id="phone">
				    	<p class="errors" id="phone-error"></p>
					</div>
					<div class="mb-3 col-sm-6">
					   <label for="email" class="form-label">Имейл адрес:</label>
			    		<input type="email" class="form-control" id="email" aria-describedby="emailHelp">
			    		<p class="errors" id="email-error"></p>
					</div>
				</div>
				<div class="row">
					<div class="mb-3 col-sm-6">
					    <label for="password" class="form-label">Парола:</label>
					    <input type="password" class="form-control" id="password">
					    <p class="errors" id="password-error"></p>
					</div>
					<div class="mb-3 col-sm-6">
					    <label for="rep-password" class="form-label">Потвърди паролата:</label>
					    <input type="password" class="form-control" id="rep-password">
					    <p class="errors" id="rep-password-error"></p>
					</div>
				</div>
				<div class="row">
					<div class=" button-wrapper col-sm">
				  		<button type="submit" id="sign-button" class="btn btn-primary form-button" onclick="return Validate('signIn')">Регистрирай се</button>
				  </div>
				</div>
			</form>
			<p class="message">Ако вече имате профил, може да се влезете от <a href="logIn.html">тук.</a> </p>
		</section>
	</main>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
